name: NotClassic Android (Modern)
on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-android-modern
  cancel-in-progress: true


jobs:
  build:
    name: Android build (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android SDK (manual stable)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

          cd $ANDROID_SDK_ROOT

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses || true

          sdkmanager "platform-tools" \
                    "platforms;android-34" \
                    "build-tools;34.0.0" \
                    "ndk;26.1.10909125"

          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          
      - name: Build APK (Debug)
        run: |
          cd misc/android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.ndkPath=$ANDROID_NDK_HOME

      - name: Rename APK
        run: |
          cp misc/android/app/build/outputs/apk/debug/app-debug.apk NotClassic-modern.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NotClassic-modern
          path: NotClassic-modern.apk